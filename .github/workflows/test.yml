name: Testing

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        # Sync project and install the 'dev' dependency group
        run: uv sync --group dev

      - name: ruff-check
        run: uv run ruff format --check scripts/ tests/

      - name: pylint
        run: uv run pylint scripts/

      - name: pytest
        run: uv run pytest tests

